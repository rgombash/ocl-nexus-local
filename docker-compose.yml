# ═══════════════════════════════════════════════════════════════════════════
# OCL Nexus Local — Docker Compose Stack
# ═══════════════════════════════════════════════════════════════════════════
# Quick Start:
#   1. Generate encryption key: openssl rand -hex 32
#   2. Copy .env.local.example to .env.local and add encryption key
#   3. docker compose up -d
#   4. Visit http://localhost:3000/dashboard
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  nexus-db:
    image: postgres:16-alpine
    container_name: nexus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
      - ./schema-local.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  # ─── K3s Kubernetes Cluster ────────────────────────────────────────────────
  nexus-k3s:
    image: rancher/k3s:v1.30.4-k3s1
    container_name: nexus-k3s
    hostname: nexus-k3s
    restart: unless-stopped
    privileged: true
    environment:
      K3S_TOKEN: nexus-local-token
      K3S_KUBECONFIG_OUTPUT: /shared/k3s/kubeconfig
      K3S_KUBECONFIG_MODE: "644"
    command:
      - server
      - --node-name=nexus-k3s
      - --write-kubeconfig-mode=644
      - --tls-san=nexus-k3s
      - --bind-address=0.0.0.0
      - --https-listen-port=6443
      - --flannel-backend=vxlan
      - --kube-apiserver-arg=default-not-ready-toleration-seconds=30
      - --kube-apiserver-arg=default-unreachable-toleration-seconds=30
      - --kube-controller-manager-arg=node-monitor-grace-period=20s
    volumes:
      - nexus-k3s-data:/var/lib/rancher/k3s
      - shared-kubeconfig:/shared/k3s
    ports:
      - "6443:6443"  # Kubernetes API
      - "80:80"      # HTTP ingress (for *.localhost)
      - "443:443"    # HTTPS ingress
    tmpfs:
      - /run
      - /var/run
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "kubectl get --raw /readyz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s  # K3s needs ~90-120s for all system pods to start

  # ─── Nexus Application ─────────────────────────────────────────────────────
  nexus-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus-app
    restart: unless-stopped
    depends_on:
      nexus-db:
        condition: service_healthy
      nexus-k3s:
        condition: service_healthy
    environment:
      # Mode
      NODE_ENV: production
      NEXUS_MODE: local
      NEXT_PUBLIC_NEXUS_MODE: local  # Browser-side mode detection
      
      # Domains
      INFRA_DOMAIN: localhost
      MARKETING_DOMAIN: localhost
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      
      # Database
      DATABASE_URL: postgresql://nexus:nexus@nexus-db:5432/nexus
      
      # Supabase (dummy values for local mode - not used but required by client creation)
      NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
      SUPABASE_ANON_KEY: dummy-anon-key
      
      # Kubernetes
      KUBECONFIG_PATH: /shared/k3s/kubeconfig
      
      # Security — override by setting ENCRYPTION_KEY in your shell or .env file.
      # Default is a safe local-only key (exactly 32 ASCII chars for AES-256-GCM).
      # Generate your own: python3 -c "import secrets; print(secrets.token_urlsafe(24)[:32])"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-nexus-local-dev-key-change-me!!!}
      
      # Mock Auth
      LOCAL_DEV_USER_ID: 00000000-0000-0000-0000-000000000000
      
      # Disable unused services
      NEXT_TELEMETRY_DISABLED: 1
    volumes:
      - shared-kubeconfig:/shared/k3s:ro
    ports:
      - "3000:3000"
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Node Cleaner ──────────────────────────────────────────────────────────
  # Runs once after K3s is healthy. Deletes stale NotReady nodes left over from
  # previous container runs so Traefik and system pods reschedule immediately.
  nexus-node-cleaner:
    image: rancher/k3s:v1.30.4-k3s1
    container_name: nexus-node-cleaner
    restart: "no"
    depends_on:
      nexus-k3s:
        condition: service_healthy
    volumes:
      - shared-kubeconfig:/shared/k3s:ro
    networks:
      - nexus-network
    entrypoint: /bin/sh
    command: >
      -c '
        cp /shared/k3s/kubeconfig /tmp/kc &&
        sed -i "s|https://0.0.0.0:6443|https://nexus-k3s:6443|" /tmp/kc &&
        export KUBECONFIG=/tmp/kc &&
        STALE=$$(k3s kubectl get nodes --no-headers | grep -v " Ready " | awk "{print \$$1}") &&
        if [ -n "$$STALE" ]; then
          echo "[node-cleaner] Removing stale nodes: $$STALE" &&
          echo "$$STALE" | xargs k3s kubectl delete node --ignore-not-found
        else
          echo "[node-cleaner] No stale nodes found."
        fi
      '

  # ─── Initialization Helper ─────────────────────────────────────────────────
  nexus-init:
    image: postgres:16-alpine
    container_name: nexus-init
    depends_on:
      nexus-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nexus:nexus@nexus-db:5432/nexus
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_HEX_32}
    volumes:
      - ./scripts/init-local.sh:/init-local.sh:ro
      - ./schema-local.sql:/schema.sql:ro
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/sh", "/init-local.sh"]
    networks:
      - nexus-network

  # ─── pgweb (PostgreSQL Web Interface) ──────────────────────────────────────
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: nexus-pgweb
    restart: unless-stopped
    depends_on:
      nexus-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://nexus:nexus@nexus-db:5432/nexus?sslmode=disable
    ports:
      - "8082:8081"
    networks:
      - nexus-network
    command: ["pgweb", "--bind=0.0.0.0", "--listen=8081", "--url=postgres://nexus:nexus@nexus-db:5432/nexus?sslmode=disable"]

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  nexus-db-data:
    driver: local
  nexus-k3s-data:
    driver: local
  shared-kubeconfig:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  nexus-network:
    driver: bridge
